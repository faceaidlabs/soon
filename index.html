<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- Attempts to fix "Unsecure Connection" by forcing HTTPS -->
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    
    <meta name="description" content="Next Generation AI Analysis - Coming Soon">
    <title>Coming Soon</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- display=block ensures text stays invisible until this font is loaded, avoiding ugly default font flashes -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=block" rel="stylesheet">

    <style>
        :root {
            --bg-primary: #09090e;
            --accent-main: #9333ea;
            --accent-glow: #b794f6;
            --fg-secondary: #a1a1aa;
            --fg-muted: #71717a;
            --border: rgba(255, 255, 255, 0.08);
            --font-main: 'Plus Jakarta Sans', sans-serif;
        }

        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            user-select: none;
        }

        html, body {
            background-color: var(--bg-primary);
            color: #fff;
            font-family: var(--font-main);
            width: 100vw;
            /* 100dvh fixes iPhone centering by accounting for the address bar */
            height: 100dvh; 
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* ── Ambient lights ── */
        .ambient-light {
            position: fixed;
            border-radius: 50%;
            filter: blur(130px);
            pointer-events: none;
            z-index: 0;
            /* Hardware acceleration for smoother loading */
            transform: translateZ(0); 
        }
        .ambient-1 {
            width: 50vw; height: 50vw;
            max-width: 500px; max-height: 500px;
            background: rgba(147, 51, 234, 0.35);
            top: -15%; left: -10%;
        }
        .ambient-2 {
            width: 60vw; height: 60vw;
            max-width: 600px; max-height: 600px;
            background: rgba(59, 130, 246, 0.15);
            bottom: -25%; right: -10%;
        }
        .ambient-3 {
            width: 70vw; height: 30vw;
            max-width: 700px; max-height: 300px;
            background: rgba(147, 51, 234, 0.1);
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) translateZ(0);
            animation: centerPulse 6s ease-in-out infinite;
        }
        
        @keyframes centerPulse {
            0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1) translateZ(0); }
            50%       { opacity: 1;   transform: translate(-50%, -50%) scale(1.12) translateZ(0); }
        }

        /* ── Grid overlay ── */
        .grid-overlay {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100dvh;
            background-image:
                linear-gradient(to right, rgba(255,255,255,0.025) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255,255,255,0.025) 1px, transparent 1px);
            background-size: 50px 50px;
            mask-image: radial-gradient(ellipse 70% 70% at center, black 0%, transparent 100%);
            -webkit-mask-image: radial-gradient(ellipse 70% 70% at center, black 0%, transparent 100%);
            z-index: 1;
            pointer-events: none;
        }

        /* ── Content (Hidden until font loads) ── */
        .content {
            position: relative;
            z-index: 10;
            max-width: 660px;
            width: 90%;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            
            /* Hidden initially, NO slide/fade animation */
            visibility: hidden;
        }

        /* Triggered instantly via JS when font is ready */
        .content.visible {
            visibility: visible;
        }

        /* ── Heading ── */
        h1 {
            font-size: 4rem;
            font-weight: 700;
            letter-spacing: -0.04em;
            line-height: 1.18;
            margin-bottom: 1.6rem;
        }

        /* ── EXTRAORDINARY ── */
        .glow-wrap {
            display: inline-block;
            position: relative;
        }

        .glow-text {
            display: inline-block;
            background: linear-gradient(
                90deg,
                #6b21a8   0%,
                #7c3aed  30%,
                #ede9fe  50%,
                #7c3aed  70%,
                #6b21a8 100%
            );
            background-size: 300% 100%;
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            -webkit-text-fill-color: transparent;
            animation: sweepLR 5s ease-in-out infinite;
            
            /* Padding fixes both the bottom AND right edge of the 'y' getting cut off */
            padding-bottom: 0.15em; 
            margin-bottom: -0.15em; 
            padding-right: 0.15em;
            margin-right: -0.15em;
            line-height: 1.25; 
        }

        @keyframes sweepLR {
            0%   { background-position: 200% center; }
            100% { background-position: -100% center; }
        }

        .glow-wrap::before {
            content: 'Extraordinary';
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            background: linear-gradient(
                90deg,
                transparent  0%,
                #9333ea     30%,
                #e9d5ff     50%,
                #9333ea     70%,
                transparent 100%
            );
            background-size: 300% 100%;
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            -webkit-text-fill-color: transparent;
            filter: blur(22px);
            animation: sweepLR 5s ease-in-out infinite, haloFade 5s ease-in-out infinite;
            z-index: -1;
            pointer-events: none;
            
            /* Match the safety padding */
            line-height: 1.25;
            padding-bottom: 0.15em;
            padding-right: 0.15em;
        }

        @keyframes haloFade {
            0%        { opacity: 0.15; }
            35%, 65%  { opacity: 0.9;  }
            100%      { opacity: 0.15; }
        }

        /* ── Subtitle ── */
        p.subtitle {
            font-size: 1.1rem;
            color: var(--fg-secondary);
            line-height: 1.75;
            max-width: 460px;
            font-weight: 400;
        }

        /* ── Footer ── */
        .footer {
            font-size: 0.82rem;
            color: var(--fg-muted);
            font-weight: 500;
            letter-spacing: 0.02em;
            margin-top: 2.5rem;
        }

        /* ── Mobile Optimization ── */
        @media (max-width: 600px) {
            h1 { font-size: 2.8rem; }
            p.subtitle { font-size: 1rem; padding: 0 10px; }
        }
    </style>
</head>
<body>

    <div class="ambient-light ambient-1"></div>
    <div class="ambient-light ambient-2"></div>
    <div class="ambient-light ambient-3"></div>
    <div class="grid-overlay"></div>

    <main class="content" id="main-content">
        <h1>Something <span class="glow-wrap"><span class="glow-text">Extraordinary</span></span> is coming.</h1>
        <p class="subtitle">
            We’re building something made just for you.
        </p>
        <div class="footer">© 2026 FaceAid Labs</div>
    </main>

    <!-- Script to ensure font is perfectly loaded BEFORE showing text instantly -->
    <script>
        const revealContent = () => {
            document.getElementById('main-content').classList.add('visible');
        };

        // Wait for the specific Plus Jakarta Sans font to be ready
        if (document.fonts && document.fonts.ready) {
            document.fonts.ready.then(revealContent);
        } else {
            // Fallback for older browsers
            window.addEventListener('load', revealContent);
        }

        // Failsafe: if font takes longer than 1.5s, force show it anyway so site doesn't stay blank
        setTimeout(revealContent, 1500);
    </script>
</body>
</html>
