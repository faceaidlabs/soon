<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <meta name="description" content="Next Generation AI Analysis - Coming Soon">
    <title>Coming Soon</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=block" rel="stylesheet">

    <style>
        :root {
            --bg-primary: #16101f;
            --accent-main: #9333ea;
            --accent-glow: #b794f6;
            --fg-secondary: #c4b5d4;
            --fg-muted: #9d8fb0;
            --border: rgba(255, 255, 255, 0.10);
            --font-main: 'Plus Jakarta Sans', sans-serif;
        }

        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            user-select: none;
        }

        html {
            height: 100%;
            /* fallback for very old browsers */
            height: -webkit-fill-available;
        }

        body {
            background-color: var(--bg-primary);
            color: #fff;
            font-family: var(--font-main);
            width: 100%;
            min-height: 100vh;
            min-height: -webkit-fill-available;
            /* Robust centering: works on old devices without dvh support */
            display: -webkit-box;
            display: -ms-flexbox;
            display: flex;
            -webkit-box-align: center;
                -ms-flex-align: center;
                    align-items: center;
            -webkit-box-pack: center;
                -ms-flex-pack: center;
                    justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* ── Ambient lights (brighter for old/dim screens) ── */
        .ambient-light {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            pointer-events: none;
            z-index: 0;
            -webkit-transform: translateZ(0);
                    transform: translateZ(0);
            /* Fallback for browsers without filter support */
            opacity: 1;
        }

        .ambient-1 {
            width: 55vw; height: 55vw;
            max-width: 540px; max-height: 540px;
            background: rgba(147, 51, 234, 0.55);
            top: -15%; left: -10%;
        }
        .ambient-2 {
            width: 65vw; height: 65vw;
            max-width: 650px; max-height: 650px;
            background: rgba(79, 70, 229, 0.30);
            bottom: -25%; right: -10%;
        }
        .ambient-3 {
            width: 70vw; height: 30vw;
            max-width: 700px; max-height: 300px;
            background: rgba(167, 100, 255, 0.22);
            top: 50%; left: 50%;
            -webkit-transform: translate(-50%, -50%) translateZ(0);
                    transform: translate(-50%, -50%) translateZ(0);
            -webkit-animation: centerPulse 6s ease-in-out infinite;
                    animation: centerPulse 6s ease-in-out infinite;
        }

        @-webkit-keyframes centerPulse {
            0%, 100% { opacity: 0.6; -webkit-transform: translate(-50%, -50%) scale(1) translateZ(0); transform: translate(-50%, -50%) scale(1) translateZ(0); }
            50%       { opacity: 1;   -webkit-transform: translate(-50%, -50%) scale(1.12) translateZ(0); transform: translate(-50%, -50%) scale(1.12) translateZ(0); }
        }
        @keyframes centerPulse {
            0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1) translateZ(0); }
            50%       { opacity: 1;   transform: translate(-50%, -50%) scale(1.12) translateZ(0); }
        }

        /* ── Grid overlay ── */
        .grid-overlay {
            position: fixed;
            inset: 0;
            top: 0; left: 0; right: 0; bottom: 0;
            width: 100%;
            height: 100%;
            background-image:
                -webkit-linear-gradient(left, rgba(255,255,255,0.035) 1px, transparent 1px),
                -webkit-linear-gradient(top, rgba(255,255,255,0.035) 1px, transparent 1px);
            background-image:
                linear-gradient(to right, rgba(255,255,255,0.035) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255,255,255,0.035) 1px, transparent 1px);
            background-size: 50px 50px;
            /* Fallback for browsers without mask */
            opacity: 0.6;
            -webkit-mask-image: -webkit-radial-gradient(ellipse 70% 70% at center, black 0%, transparent 100%);
                    mask-image: radial-gradient(ellipse 70% 70% at center, black 0%, transparent 100%);
            z-index: 1;
            pointer-events: none;
        }

        /* ── Wrapper: the real centering guarantee ── */
        .center-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            min-height: 100vh;
            min-height: -webkit-fill-available;
            display: -webkit-box;
            display: -ms-flexbox;
            display: flex;
            -webkit-box-align: center;
                -ms-flex-align: center;
                    align-items: center;
            -webkit-box-pack: center;
                -ms-flex-pack: center;
                    justify-content: center;
            padding: 40px 20px;
        }

        /* ── Content ── */
        .content {
            max-width: 660px;
            width: 100%;
            text-align: center;
            display: -webkit-box;
            display: -ms-flexbox;
            display: flex;
            -webkit-box-orient: vertical;
            -webkit-box-direction: normal;
                -ms-flex-direction: column;
                    flex-direction: column;
            -webkit-box-align: center;
                -ms-flex-align: center;
                    align-items: center;
            visibility: hidden;
        }

        .content.visible {
            visibility: visible;
        }

        /* ── Heading ── */
        h1 {
            font-size: 4rem;
            font-weight: 700;
            letter-spacing: -0.04em;
            line-height: 0.8;
            margin-bottom: 1.6rem;
            /* Ensure crisp rendering on old screens */
            text-rendering: optimizeLegibility;
        }

        /* ── EXTRAORDINARY glow text ── */
        .glow-wrap {
            display: inline-block;
            position: relative;
        }

        .glow-text {
            display: inline-block;
            background: -webkit-linear-gradient(
                left,
                #7c2dd4   0%,
                #9333ea  30%,
                #f3e8ff  50%,
                #9333ea  70%,
                #7c2dd4 100%
            );
            background: linear-gradient(
                90deg,
                #7c2dd4   0%,
                #9333ea  30%,
                #f3e8ff  50%,
                #9333ea  70%,
                #7c2dd4 100%
            );
            background-size: 300% 100%;
            -webkit-background-clip: text;
                    background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
            -webkit-animation: sweepLR 5s ease-in-out infinite;
                    animation: sweepLR 5s ease-in-out infinite;
            padding-bottom: 0.15em;
            margin-bottom: -0.15em;
            padding-right: 0.15em;
            margin-right: -0.15em;
            line-height: 1.25;
        }

        /* Fallback for browsers that don't support background-clip: text */
        @supports not (-webkit-background-clip: text) {
            .glow-text {
                color: #b794f6;
                background: none;
            }
        }

        @-webkit-keyframes sweepLR {
            0%   { background-position: 200% center; }
            100% { background-position: -100% center; }
        }
        @keyframes sweepLR {
            0%   { background-position: 200% center; }
            100% { background-position: -100% center; }
        }

        .glow-wrap::before {
            content: 'Extraordinary';
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            background: -webkit-linear-gradient(
                left,
                transparent  0%,
                #9333ea     30%,
                #e9d5ff     50%,
                #9333ea     70%,
                transparent 100%
            );
            background: linear-gradient(
                90deg,
                transparent  0%,
                #9333ea     30%,
                #e9d5ff     50%,
                #9333ea     70%,
                transparent 100%
            );
            background-size: 300% 100%;
            -webkit-background-clip: text;
                    background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
            -webkit-filter: blur(22px);
                    filter: blur(22px);
            -webkit-animation: sweepLR 5s ease-in-out infinite, haloFade 5s ease-in-out infinite;
                    animation: sweepLR 5s ease-in-out infinite, haloFade 5s ease-in-out infinite;
            z-index: -1;
            pointer-events: none;
            line-height: 1.25;
            padding-bottom: 0.15em;
            padding-right: 0.15em;
        }

        @-webkit-keyframes haloFade {
            0%        { opacity: 0.2; }
            35%, 65%  { opacity: 1;   }
            100%      { opacity: 0.2; }
        }
        @keyframes haloFade {
            0%        { opacity: 0.2; }
            35%, 65%  { opacity: 1;   }
            100%      { opacity: 0.2; }
        }

        /* ── Subtitle ── */
        p.subtitle {
            font-size: 1.1rem;
            color: var(--fg-secondary);
            line-height: 1.75;
            max-width: 460px;
            font-weight: 400;
        }

        /* ── Footer ── */
        .footer {
            font-size: 0.82rem;
            color: var(--fg-muted);
            font-weight: 500;
            letter-spacing: 0.02em;
            margin-top: 2.5rem;
        }

        /* ── Mobile ── */
        @media (max-width: 600px) {
            h1 { font-size: 2.8rem; }
            p.subtitle { font-size: 1rem; padding: 0 10px; }
        }

        /* ── Very old / low-res devices (e.g. 320px wide) ── */
        @media (max-width: 360px) {
            h1 { font-size: 2.2rem; letter-spacing: -0.02em; }
            p.subtitle { font-size: 0.95rem; }
        }
    </style>
</head>
<body>

    <div class="ambient-light ambient-1"></div>
    <div class="ambient-light ambient-2"></div>
    <div class="ambient-light ambient-3"></div>
    <div class="grid-overlay"></div>

    <!-- Wrapper guarantees centering even on browsers without dvh support -->
    <div class="center-wrapper">
        <main class="content" id="main-content">
            <h1>Something <span class="glow-wrap"><span class="glow-text">Extraordinary</span></span> is coming.</h1>
            <p class="subtitle">
                We're building something made just for you.
            </p>
            <div class="footer">© 2026 FaceAid Labs</div>
        </main>
    </div>

    <script>
        var revealed = false;
        function revealContent() {
            if (revealed) return;
            revealed = true;
            var el = document.getElementById('main-content');
            if (el) el.classList.add('visible');
        }

        if (document.fonts && document.fonts.ready) {
            document.fonts.ready.then(revealContent);
        } else {
            window.addEventListener('load', revealContent);
        }

        // Failsafe for old browsers that don't support font loading API
        setTimeout(revealContent, 1500);
    </script>
</body>
</html>
